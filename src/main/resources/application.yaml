spring:
  application:
    name: cafesaas
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/cafe_saas}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres@123}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate       # Never auto-create tables — Flyway owns the schema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
#  data:
#    redis:
#      host: ${REDIS_HOST:localhost}
#      port: ${REDIS_PORT:6379}

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-minimum-256-bits-long-replace-in-prod}
    expiration-ms: 86400000    # 24 hours


management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always
server:
  port: 8082

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true