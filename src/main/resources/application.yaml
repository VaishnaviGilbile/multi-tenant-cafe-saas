spring:
  application:
    name: cafesaas
  datasource:
    url: jdbc:postgresql://localhost:5433/cafe_saas
    username: postgres
    password: postgres@123
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate       # Never auto-create tables — Flyway owns the schema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-minimum-256-bits-long-replace-in-prod}
    expiration-ms: 86400000    # 24 hours

server:
  port: 8082

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true